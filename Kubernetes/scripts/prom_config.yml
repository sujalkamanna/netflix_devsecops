scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["52.66.223.140:9100"]

  - job_name: "jenkins"
    metrics_path: "/prometheus"
    static_configs:
      - targets: ["52.66.223.140:8080"]

  - job_name: "blackbox"
    metrics_path: /probe
    params:
      module: [http_2xx]

    static_configs:
      - targets:
          - http://example.com
          - http://52.66.223.140:8080

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: localhost:9115