# apply config
# promtool check config /etc/prometheus/prometheus.yml
# sudo systemctl restart prometheus

# WHAT RUNS WHERE
# Monitoring Server → 9.9.9.9

# Runs:
# Prometheus
# Grafana
# Blackbox Exporter

# App Server → 8.8.8.8

# Runs:
# Jenkins
# Node Exporter
# Your Application

global:
  scrape_interval: 15s

scrape_configs:

  # Prometheus (local)
  - job_name: "prometheus"
    static_configs:
      - targets: [ "localhost:9090" ]

  # Node Exporter (REMOTE SERVER)
  - job_name: "node_exporter"
    static_configs:
      - targets: [ "8.8.8.8:9100" ]

  # Jenkins (REMOTE SERVER)
  - job_name: "jenkins"
    metrics_path: "/prometheus/"
    static_configs:
      - targets: [ "8.8.8.8:8080" ]

  # Blackbox (LOCAL exporter probing REMOTE)
  - job_name: "blackbox"
    metrics_path: /probe
    params:
      module: [ http_2xx ]

    static_configs:
      - targets:
          - http://8.8.8.8:8080
          - http://example.com

    relabel_configs:
      - source_labels: [ __address__ ]
        target_label: __param_target

      - source_labels: [ __param_target ]
        target_label: instance

      - target_label: __address__
        replacement: localhost:9115
